<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hannah Peralta</title>
    <meta name="description" content="Portfolio of Hannah Jamilla Peralta — IT Graduate, Web Developer, and Creative Builder based in Bulacan, Philippines. Explore projects, skills, and achievements." />
    <meta name="author" content="Hannah Jamilla Peralta" />
    <meta name="theme-color" content="#0a0a0f" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Hannah Peralta | IT Graduate & Web Developer" />
    <meta property="og:description" content="Portfolio of Hannah Jamilla Peralta — IT Graduate and Creative Builder from Bulacan, Philippines." />
    <meta property="og:image" content="/images/Hannah-casual4.webp" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Favicon -->
    <link rel="icon" type="image/webp" href="/images/HanMade.webp" />

    <!-- Critical Resource Hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Preload Critical Images -->
    <link rel="preload" as="image" href="/images/cover-photo-Hannah-small.webp" media="(max-width: 768px)" fetchpriority="high" />
    <link rel="preload" as="image" href="/images/cover-photo-Hannah.webp" media="(min-width: 769px)" fetchpriority="high" />
    <link rel="preload" as="image" href="/images/Hannah-casual4-small.webp" media="(max-width: 768px)" fetchpriority="high" />
    <link rel="preload" as="image" href="/images/Hannah-casual4.webp" media="(min-width: 769px)" fetchpriority="high" />

    <!-- Inline critical font loading to avoid render blocking -->
    <style>
      body { 
        font-family: system-ui, -apple-system, sans-serif; 
        margin: 0;
        padding: 0;
      }
      .font-loading {
        font-display: swap;
        visibility: hidden;
      }
      .font-loaded .font-loading {
        visibility: visible;
      }
      /* Critical above-the-fold styles */
      .nav-blur {
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      /* Hide content until fonts load to prevent FOUT */
      .text-content {
        visibility: hidden;
      }
      .font-loaded .text-content {
        visibility: visible;
      }
      /* Critical layout styles */
      .min-h-screen { min-height: 100vh; }
      .w-full { width: 100%; }
      .h-auto { height: auto; }
      .block { display: block; }
      .fixed { position: fixed; }
      .relative { position: relative; }
      .z-50 { z-index: 50; }
      /* Reduce initial paint time */
      img { 
        display: block; 
        max-width: 100%; 
        height: auto; 
      }
    </style>
    
    <script>
      // Load fonts asynchronously and mark when ready
      const fontLoadPromise = document.fonts ? document.fonts.ready : Promise.resolve();
      fontLoadPromise.then(() => {
        document.documentElement.classList.add('font-loaded');
      });
      
      // Unregister service worker locally to prevent Vite Dev Server WebSocket conflicts
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.getRegistrations().then((registrations) => {
            for (let registration of registrations) {
              registration.unregister();
            }
          });
        });
      }
    </script>
    
    <!-- Defer non-critical fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="preload"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
